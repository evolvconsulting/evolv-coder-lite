name: promote-dev-to-main

# After a daily-sync PR is merged into dev, automatically open (or update)
# a fast-forward PR from dev to main and enable auto-merge on it.
#
# NOTE: this repo currently has NO branch protection (private repo on
# free GitHub tier — rulesets unavailable). gh pr merge --auto will
# therefore merge as soon as required checks pass. The CI workflow
# (`ci.yml`) runs on every PR; a green CI is the only gate.
#
# If/when the org upgrades to Team/Enterprise, add a ruleset on `main`
# requiring the `build-and-verify` check, with github-actions[bot] in
# the bypass list, and this workflow will work as designed.

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if dev is already at main
        id: gate
        run: |
          git fetch origin main:main
          if git merge-base --is-ancestor origin/dev main; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "dev is fully merged into main; nothing to promote."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update dev→main PR
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr view dev --json number >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head dev \
              --title "promote: dev → main" \
              --body "Automated promotion of dev into main. Created by promote-dev-to-main on each push to dev. Auto-merge enabled; will land when CI passes." \
              --label promote
          else
            echo "dev→main PR already exists; nothing to (re)create."
          fi

      - name: Enable auto-merge
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr view dev --json number --jq .number)
          gh pr merge "$PR_NUMBER" --auto --squash || \
            echo "Could not enable auto-merge — likely no required checks are defined yet, in which case the PR may have merged immediately. Check the PR state."


