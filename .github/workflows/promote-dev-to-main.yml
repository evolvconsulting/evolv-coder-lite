            gh pr create \
              --base main \
              --head dev \
              --title "promote: dev → main" \
              --body "Automated promotion of dev into main. Created by promote-dev-to-main workflow on each push to dev. Auto-merge enabled; will land when required checks/approvals are satisfied." \
              --label promote
          else
            echo "dev→main PR already exists; nothing to (re)create."
          fi

      - name: Enable auto-merge
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr view dev --json number --jq .number)
          gh pr merge "$PR_NUMBER" --auto --squash || \
            echo "Could not enable auto-merge (likely: branch protection requires approval that the bot can't satisfy yet). PR is open and waiting."
