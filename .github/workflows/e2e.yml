name: e2e

# Docker-based end-to-end smoke harness. Bakes src/, packs the tarball,
# spins up a Node 24 container that installs the tarball globally, and
# runs the smoke suite under e2e/tests/. No Bedrock / no model calls —
# install-and-inventory only.
#
# Catches things ci.yml can't: tarball-time mode-bit drops, missing
# bin entries, files-array regressions, wizard scaffold breakage.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: docker/setup-buildx-action@v3

      - name: Bake src/ from upstream/ + overlay
        run: node overlay/bake.mjs

      - name: Build SDK + npm pack (stages tarball at repo root)
        # run-e2e.sh does this too, but pre-staging here lets the docker build
        # step be a clean cached step independent of the test run. Mirrors
        # steps 2-3 of run-e2e.sh.
        run: |
          ( cd src/sdk && npm ci --silent && npm run build --silent )
          ( cd src && rm -f evolvconsulting-evolv-coder-lite-*.tgz && npm pack --silent )
          cp src/evolvconsulting-evolv-coder-lite-*.tgz ./

      - name: Build e2e image with GHA layer cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: e2e/Dockerfile
          load: true
          tags: evolv-coder-lite-e2e:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e suite (against pre-built cached image)
        # Compose uses image: from the .ci.yml override instead of building
        # from scratch. --no-build prevents compose from rebuilding via the
        # inherited build: directive in docker-compose.yml. The pre-built
        # tarball was baked into the image in the previous step.
        run: |
          docker compose \
            -f e2e/docker-compose.yml \
            -f e2e/docker-compose.ci.yml \
            up --no-build --abort-on-container-exit --exit-code-from e2e

      - name: Tear down
        if: always()
        run: |
          docker compose -f e2e/docker-compose.yml -f e2e/docker-compose.ci.yml \
            down --remove-orphans || true
          rm -f evolvconsulting-evolv-coder-lite-*.tgz
