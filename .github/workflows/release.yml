name: release

# Publishes src/ to npm as @evolvconsulting/evolv-coder-lite when a
# version tag is pushed. Also publishes the standalone SDK package
# @evolvconsulting/ecl-sdk from src/sdk/.
#
# Trigger: `git tag v<X.Y.Z> && git push --tags`
# The tag's <X.Y.Z> must match src/package.json's version exactly, or
# the workflow fails fast (prevents accidentally publishing the wrong
# version).
#
# Requires repo secret NPM_TOKEN (npm automation token with publish
# rights to the @evolvconsulting scope).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, run npm publish --dry-run instead of publishing'
        required: false
        default: 'false'

permissions:
  contents: read
  # NOTE: id-token: write is needed only for `npm publish --provenance`.
  # Provenance was removed because the npm account's 2FA-on-writes setting
  # blocked it (EOTP from GitHub Actions). Sibling @evolvconsulting packages
  # publish without provenance for the same reason. Re-add this permission
  # plus --provenance to both steps below if/when the 2FA setting changes.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match upstream's NODE_VERSION (24). 22 still ICE'd the SDK tsc build
          # despite engines: node>=22 — upstream's release pins to 24.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # ── Pre-publish gates ──────────────────────────────────────────────
      # Each gate fails the workflow before any tarball is published.
      # Order is cheapest-first: rebrand and bake-freshness checks before
      # any npm install runs, so a leak fails in seconds rather than minutes.

      - name: Verify rebrand (no leaks)
        run: node scripts/verify-rebrand.mjs

      - name: Confirm src/ matches a fresh bake
        run: |
          node overlay/bake.mjs
          if [ -n "$(git status --porcelain -- 'src/' ':!src/REBRAND-MANIFEST.json')" ]; then
            echo "::error::src/ does not match a fresh bake. Re-run 'npm run build' locally and commit before tagging."
            git status --short -- 'src/' ':!src/REBRAND-MANIFEST.json'
            exit 1
          fi

      - name: Cross-check tag against parent package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./src/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG does not match src/package.json version $PKG_VERSION."
            echo "Either retag, or bump src/package.json (via overlay/package.patch.json) and re-bake first."
            exit 1
          fi
          echo "Tag and parent package.json version both at $PKG_VERSION."

      - name: Install src/ dependencies
        working-directory: src
        run: npm ci || npm install --no-audit --no-fund

      - name: Pre-install SDK dependencies
        # `npm publish` propagates --dry-run to child npm calls, which
        # breaks the `npm ci` inside prepublishOnly's build:sdk script
        # (it runs in dry-run mode, prints "add X" lines but never
        # actually populates node_modules, then tsc fails with
        # "command not found"). Pre-installing here means the lifecycle
        # script's `npm ci` is a no-op (deps already match lockfile),
        # and tsc finds typescript in node_modules/.bin/.
        working-directory: src/sdk
        run: npm ci

      - name: Production audit (parent)
        working-directory: src
        run: npm audit --omit=dev --audit-level=moderate

      - name: Production audit (SDK)
        working-directory: src/sdk
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run unit test suite
        working-directory: src
        run: node scripts/run-tests.cjs --suite unit

      - name: Build SDK (tsc) before tarball smoke
        # release-tarball-smoke.cjs packs the parent and exercises the installed
        # ecl-sdk binary. The parent package files allowlist ships sdk/dist;
        # the SDK build must produce dist/ before we pack so the smoke runs
        # against a complete tarball. SDK tarball publish below also relies
        # on this build via its own prepublishOnly, but we run it here once
        # so both downstream steps benefit.
        working-directory: src/sdk
        run: npm run build

      - name: Release tarball smoke
        working-directory: src
        run: node scripts/release-tarball-smoke.cjs

      - name: Pack-contents check (README links resolve)
        run: node scripts/check-pack-contents.mjs

      # ── Publish gates ──────────────────────────────────────────────────
      # Both packages publish atomically — if the parent ships and the SDK
      # publish fails, the dist/sdk/* shim in the parent still works because
      # the parent bundles sdk/dist itself. Standalone @evolvconsulting/ecl-sdk
      # then becomes available on the next release attempt.

      - name: Publish parent to npm (dry-run)
        if: inputs.dry_run == 'true'
        working-directory: src
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --access public

      - name: Publish SDK to npm (dry-run)
        if: inputs.dry_run == 'true'
        working-directory: src/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --access public

      - name: Publish parent to npm
        if: github.event_name == 'push' || inputs.dry_run != 'true'
        working-directory: src
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish SDK to npm
        if: github.event_name == 'push' || inputs.dry_run != 'true'
        working-directory: src/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
