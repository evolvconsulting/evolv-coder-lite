name: daily-sync

# Daily release watcher for open-gsd/get-shit-done-redux.
#
# Phase 1 (cheap):  Ask GitHub releases API for the latest tag.
# Phase 2 (heavy):  Only if Phase 1 reports a new tag, run sync-and-patch
#                   to compute the diff, translate through the rebrand
#                   overlay, and open a PR against `dev`.
#
# PRs are NOT auto-merged at this layer. The bot pushes a branch and
# opens a PR against dev; reviewers (or the auto-merge-dev-to-main
# workflow) handle promotion to main.

on:
  schedule:
    - cron: '17 13 * * *'   # daily, 13:17 UTC
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Run sync even if no new release (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-sync
  cancel-in-progress: false

jobs:
  poll-release:
    name: Poll upstream releases
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.poll.outputs.new_release }}
      current_ref: ${{ steps.poll.outputs.current_ref }}
      latest_ref: ${{ steps.poll.outputs.latest_ref }}
      release_name: ${{ steps.poll.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check for new upstream release
        id: poll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-upstream-release.mjs

  sync:
    name: Sync and open PR
    needs: poll-release
    if: needs.poll-release.outputs.new_release == 'true' || inputs.force_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git author
        run: |
          git config user.name 'evolv-coder-lite-bot'
          git config user.email 'evolv-coder-lite-bot@users.noreply.github.com'

      - name: Run sync-and-patch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-and-patch.mjs

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No working-tree changes after sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short | head -30
          fi

      - name: Verify rebrand
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/verify-rebrand.mjs

      - name: Open / update PR against dev
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.poll-release.outputs.latest_ref }}
        run: |
          BRANCH="upstream-sync/${NEW_TAG}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH" || git checkout -B "$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes after sync — branch is already up to date with this tag. Skipping commit/push."
          else
            git commit -m "chore(sync): bump upstream to ${NEW_TAG}"
            git push -u origin "$BRANCH" --force-with-lease
          fi

          # Match PRs by head branch AND open state. `gh pr view <branch>` would
          # match closed/merged PRs too, causing `gh pr create` to be skipped on
          # re-runs after a stale PR was closed (see #25 → #28).
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base dev \
              --head "$BRANCH" \
              --title "chore(sync): bump upstream to ${NEW_TAG}" \
              --body-file SYNC-REPORT.md \
              --label upstream-sync \
              --label needs-review
          else
            echo "Open PR #${EXISTING_PR} already tracks $BRANCH; updated branch in place."
          fi
