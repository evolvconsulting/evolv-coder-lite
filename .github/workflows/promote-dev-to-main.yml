name: promote-dev-to-main

# After a daily-sync PR is merged into dev, automatically open (or update)
# a fast-forward PR from dev to main and enable auto-merge on it.
#
# Branch protection on main should require:
#   - PR with at least 1 approving review (or, if you've granted
#     github-actions[bot] the bypass, that's the approval), AND
#   - All required status checks passing.
#
# This workflow does NOT bypass review — it just keeps the dev→main PR
# always open and ready to merge. If you want zero-touch promotion,
# grant github-actions[bot] a CODEOWNERS exception or add it to the
# bypass list for the main ruleset.

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if dev is already at main
        id: gate
        run: |
          git fetch origin main:main
          if git merge-base --is-ancestor origin/dev main; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "dev is fully merged into main; nothing to promote."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update dev→main PR
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # One persistent PR; subsequent dev pushes update it in place.
          if ! gh pr view dev --json number >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head dev \
              --title "promote: dev → main" \
              --body "Automated promotion of dev into main. Created by promote-dev-to-main workflow on each push to dev. Auto-merge enabled; will land when required checks/approvals are satisfied." \
              --label promote
          else
            echo "dev→main PR already exists; nothing to (re)create."
          fi

      - name: Enable auto-merge
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr view dev --json number --jq .number)
          gh pr merge "$PR_NUMBER" --auto --squash || \
            echo "Could not enable auto-merge (likely: branch protection requires approval that the bot can't satisfy yet). PR is open and waiting."
